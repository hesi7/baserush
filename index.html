<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BaseRush</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <style>
        body { background: #050505; color: #fff; text-align: center; font-family: sans-serif; }
        button { padding: 15px 30px; cursor: pointer; background: #0052FF; color: white; border: none; border-radius: 8px; margin: 10px; }
    </style>
</head>
<body>
    <h1>BaseRush</h1>
    <div id="status">Status: Disconnected</div>
    <button id="connectBtn">Connect Wallet</button>
    <button id="submitBtn">Submit Score</button>

    <script>
        const contractAddress = "0x57Cece13cfC5AfAF2fB059A394d174f21d11a1cA";
        const abi = [{"inputs":[{"internalType":"uint256","name":"_score","type":"uint256"}],"name":"submitScore","outputs":[],"stateMutability":"nonpayable","type":"function"}];

        // چک کردن لود شدن کتابخانه
        window.onload = () => {
            if (typeof ethers === 'undefined') {
                document.getElementById('status').innerText = "Error: Library failed to load. Check your internet!";
            }
        };

        document.getElementById('connectBtn').onclick = async () => {
            if (!window.ethereum) return alert("Wallet not detected!");
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            document.getElementById('status').innerText = "Connected: " + accounts[0].slice(0,6);
        };

        document.getElementById('submitBtn').onclick = async () => {
            try {
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                const signer = provider.getSigner();
                const contract = new ethers.Contract(contractAddress, abi, signer);
                await contract.submitScore(2048);
                alert("Success!");
            } catch (e) {
                alert("Transaction Error: " + e.message);
            }
        };
    </script>
</body>
</html>
