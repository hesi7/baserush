<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BaseRush | Play & Earn</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <style>
        body { background: #050505; color: #fff; text-align: center; font-family: 'Arial', sans-serif; margin: 0; padding: 20px; }
        h1 { color: #0052FF; }
        #game-board { width: 320px; height: 320px; background: #1a1a1a; margin: 20px auto; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 10px; border-radius: 10px; border: 2px solid #0052FF; }
        .cell { background: #333; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 24px; color: #00d4ff; border-radius: 5px; }
        .controls { margin-top: 20px; }
        button { padding: 15px 30px; cursor: pointer; background: #0052FF; color: white; border: none; border-radius: 8px; font-weight: bold; margin: 5px; }
        button:disabled { background: #444; }
        #status { margin-top: 15px; color: #aaa; }
    </style>
</head>
<body>
    <h1>BaseRush</h1>
    <div id="game-board"></div>
    <div class="controls">
        <button id="connectBtn">Connect Wallet</button>
        <button id="submitBtn" disabled>Submit Score</button>
    </div>
    <div id="status">Status: Disconnected</div>

    <script>
        const contractAddress = "0x57Cece13cfC5AfAF2fB059A394d174f21d11a1cA";
        const BASE_CHAIN_ID = '0x2105'; 

        // ۱. ساخت جدول بازی
        const board = document.getElementById('game-board');
        for(let i = 0; i < 16; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.innerText = "2"; // عدد اولیه بازی
            board.appendChild(cell);
        }

        // ۲. اتصال و نمایش آدرس حرفه‌ای
        document.getElementById('connectBtn').onclick = async () => {
            if (!window.ethereum) return alert("Install MetaMask or Rabby!");
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            
            // تغییر شبکه به Base
            try {
                await window.ethereum.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: BASE_CHAIN_ID }] });
            } catch(e) { alert("Please switch to Base Network!"); }

            const addr = accounts[0];
            const displayAddr = addr.substring(0, 6) + "..." + addr.substring(addr.length - 5);
            document.getElementById('status').innerText = "Connected: " + displayAddr;
            document.getElementById('connectBtn').disabled = true;
            document.getElementById('submitBtn').disabled = false;
        };

        // ۳. ثبت امتیاز
        document.getElementById('submitBtn').onclick = async () => {
            try {
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                const contract = new ethers.Contract(contractAddress, ["function submitScore(uint256)"], provider.getSigner());
                document.getElementById('status').innerText = "Sending transaction...";
                const tx = await contract.submitScore(2048);
                await tx.wait();
                alert("Score Submitted Successfully!");
            } catch (e) { alert("Error: " + e.message); }
        };
    </script>
</body>
</html>
