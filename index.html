<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BaseRush | Play & Earn</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <style>
        body { background: #050505; color: #fff; text-align: center; font-family: 'Arial', sans-serif; padding: 20px; }
        h1 { color: #0052FF; }
        #game-board { width: 320px; height: 320px; background: #1a1a1a; margin: 20px auto; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 10px; border-radius: 10px; border: 2px solid #0052FF; }
        .cell { background: #333; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; color: #00d4ff; border-radius: 5px; }
        button { padding: 12px 20px; cursor: pointer; background: #0052FF; color: white; border: none; border-radius: 8px; font-weight: bold; margin: 5px; }
        #status { margin-top: 15px; color: #aaa; font-size: 14px; }
    </style>
</head>
<body>
    <h1>BaseRush</h1>
    <div id="game-board"></div>
    <div class="controls">
        <button id="connectBtn">Connect Wallet</button>
        <button id="submitBtn" disabled>Submit Score</button>
    </div>
    <div id="status">Status: Disconnected</div>

    <script>
        const contractAddress = "0x57Cece13cfC5AfAF2fB059A394d174f21d11a1cA";
        const board = document.getElementById('game-board');
        
        // ساخت جدول
        for(let i = 0; i < 16; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.innerText = i === 0 ? (localStorage.getItem('myScore') || "0") : "0";
            board.appendChild(cell);
        }

        document.getElementById('connectBtn').onclick = async () => {
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            document.getElementById('status').innerText = "Connected: " + accounts[0].substring(0, 6) + "..." + accounts[0].substring(38);
            document.getElementById('submitBtn').disabled = false;
        };

        document.getElementById('submitBtn').onclick = async () => {
            try {
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                const contract = new ethers.Contract(contractAddress, ["function submitScore(uint256)"], provider.getSigner());
                
                document.getElementById('status').innerText = "Submitting to blockchain...";
                await contract.submitScore(2048);
                
                // ذخیره در مرورگر بعد از موفقیت تراکنش
                localStorage.setItem('myScore', "2048");
                document.getElementsByClassName('cell')[0].innerText = "2048";
                
                alert("Score Submitted & Saved!");
            } catch (e) { alert("Transaction Error!"); }
        };
    </script>
</body>
</html>
